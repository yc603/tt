<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>生日礼物</title>

<link rel="stylesheet" href="style.css">

<!-- 🎂 WebGL 3D库 -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

</head>

<body>

<!-- 第一幕 -->
<div class="page active" id="p1">
<h1>欢迎，等你很久了~</h1>
<button onclick="go(2)">进入</button>
</div>

<!-- 第二幕：答题 -->
<div class="page" id="p2">
<h2 id="qtitle"></h2>
<div id="options"></div>
</div>

<!-- 第三幕：3D蛋糕 -->
<div class="page" id="p3">
<div id="cake3d"></div>
<h2>🎂 生日快乐</h2>
<button onclick="go(4)">继续</button>
</div>

<!-- 第四幕：信封 -->
<div class="page" id="p4">

<div class="env" onclick="openEnvelope()" id="env">
<div class="flap"></div>
<div class="body"></div>
</div>

<div class="paper" id="paper">生日快乐 🎉</div>

</div>

<!-- 第五幕 -->
<div class="page" id="p5">
<h2>🎉 祝福</h2>
<button onclick="go(6)">继续</button>
</div>

<!-- 第六幕 -->
<div class="page" id="p6">
<video controls>
<source src="video.mp4">
</video>
</div>

<script src="script.js"></script>
</body>
</html>
