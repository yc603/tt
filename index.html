<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>给杰尼🐢的生日祝福</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>

<body>

<audio id="bgm" loop>
<source src="music/ydmp3.mp3" type="audio/mpeg">
</audio>
  
<!-- 第一幕 -->
<div class="page active" id="p1">
<h1>你来了寿星，等你很久了~</h1>
<button id="startBtn">进入考验环节</button>
</div>

<!-- 第二幕 -->
<div class="page" id="p2">
<h2 id="qtitle"></h2>
<div id="options"></div>
</div>

<!-- 第三幕 -->
<div class="page" id="p3">
<div id="cake3d"></div>
<h2>🎂许个愿吧，这个蛋糕生得不容易🎂</h2>
<button onclick="blowCandle()">吹蜡烛😯</button>
</div>

<!-- 第四幕 -->
<div class="page" id="p4">

<div class="envelope" id="env">
<div class="seal" onclick="openEnvelope()">😏</div>
</div>

</div>

<!-- 新增：信纸页面 -->
<div class="page" id="p6">

<div class="letter-page">
<div class="letter-paper">
<div id="letterText"></div>
</div>

<button id="nextBtn" onclick="go(7)" style="display:none;margin-top:20px;">
美美收下✨
</button>
</div>
</div>

<!-- 第七幕：明信片 -->
<div class="page" id="p7">

<div class="postcard-wrap">

<div class="postcard-left">
<img src="img/9.jpg" alt="photo">
</div>

<div class="postcard-right">

<h2>给寿星的一张明信片 💌</h2>

<p id="wishText">
愿你新的一岁，<br>
平安喜乐，万事顺遂。<br>
愿你每天都有好心情，<br>
做想做的事，见想见的人。<br><br>

生日快乐绿老头🎂
</p>

<button onclick="go(5)">收下礼物🎁</button>

</div>

</div>

</div>

  
<!-- 第五幕：视频回忆 -->
<div class="page" id="p5">

<h2>11分钟纯手工小视频</h2>

<iframe
id="finalVideo"
src="https://drive.google.com/file/d/1YQLMiR8m6lsmrib-OEmnK1ADXDyPPhCa/preview"
width="90%"
height="400"
allow="autoplay"
allowfullscreen
style="
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,.3);
">
</iframe>

</div>
  
<script src="script.js"></script>
</body>
</html>
