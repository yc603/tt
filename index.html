<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>给杰尼🐢的生日祝福</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>

<body>

<audio id="bgm" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 第一幕 -->
<div class="page active" id="p1">
<h1>你来了寿星，等你很久了~</h1>
<button onclick="go(2)">进入考验环节</button>
</div>

<!-- 第二幕 -->
<div class="page" id="p2">
<h2 id="qtitle">准备好了吗？</h2>
<div id="options"></div>
</div>

<!-- 第三幕 -->
<div class="page" id="p3">
<div id="cake3d"></div>
<h2>🎂许个愿吧🎂</h2>
<button onclick="blowCandle()">吹蜡烛🎂</button>
</div>

<!-- 第四幕 -->
<div class="page" id="p4">
<div class="envelope">
<div class="seal" onclick="openEnvelope()">😏</div>
</div>
</div>

<!-- 第五幕：信纸 -->
<div class="page" id="p5">
<div class="letter-page">
<div class="letter-paper" id="letterText"></div>

<button id="nextBtn" onclick="go(6)" style="display:none;">
继续探索 ✨
</button>

</div>
</div>

<!-- 第六幕：照片 + 明信片 -->
<div class="page" id="p6">

<div class="photos" id="photos"></div>

<div class="postcard-container">
<div class="postcard" id="card" onclick="flipCard()">

<div class="card-face card-front">
<h2>💌</h2>
<p>点击翻开</p>
</div>

<div class="card-face card-back">
<h2 id="typeText"></h2>
</div>

</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
